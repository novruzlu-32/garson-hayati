<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Garson Həyatı - FULL VERSION</title>
    <style>
        body { background: #080808; color: #00ff66; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; overflow: hidden; }
        #status-bar { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; background: #151515; padding: 10px; border: 2px solid #222; border-radius: 12px; font-size: 13px; margin-bottom: 5px; }
        #output { flex-grow: 1; overflow-y: auto; background: #000; border: 1px solid #1a1a1a; padding: 15px; margin-bottom: 10px; border-radius: 10px; font-size: 14px; line-height: 1.6; color: #d0d0d0; border-left: 5px solid #00ff66; }
        #button-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; background: #111; padding: 12px; border-top: 3px solid #222; max-height: 45%; overflow-y: auto; border-radius: 15px 15px 0 0; }
        button { background: #202020; color: #fff; border: 1px solid #333; padding: 12px 2px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        button:active { background: #444; transform: scale(0.92); }
        .action { background: #2980b9; border-color: #3498db; }
        .money { background: #218c74; border-color: #33d9b2; }
        .luck-btn { background: #8e44ad; border-color: #9b59b6; }
        .sell-btn { background: #b33939; border-color: #ff5252; }
        .menu-title { grid-column: span 5; text-align: center; color: #f1c40f; font-size: 12px; padding: 4px; font-weight: bold; }
        .full-btn { grid-column: span 5; padding: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="status-bar">
        <div>💵 Nağd: <span id="s-pul">0</span> AZE</div>
        <div>🏦 Bank: <span id="s-bank">0</span> AZE</div>
        <div>⛽ Benzin: <span id="s-benz">100</span> L</div>
        <div>🚗 Maşın: <span id="s-masin">0</span> | 🏠 Ev: <span id="s-ev">0</span></div>
        <div id="s-is" style="grid-column: span 2; color: #f1c40f; margin-top:4px; text-align:center;">İşində uğurlar, qardaşım!</div>
    </div>

    <div id="output"></div>
    <div id="button-grid"></div>

<script>
    // --- OYUN DATA (100 MAŞIN VƏ 40 MARKET) ---
    // Kodundakı köhnə "const CARS_MASTER = [];" hissəsini bu siyahı ilə əvəz et:
const CARS_MASTER = [
    {ad: "VAZ 2101", q: 1200}, {ad: "VAZ 21011", q: 1500}, {ad: "VAZ 2103", q: 2200}, {ad: "VAZ 2105", q: 3500}, {ad: "VAZ 2106", q: 4500},
    {ad: "VAZ 2107", q: 7500}, {ad: "VAZ 2109", q: 4000}, {ad: "VAZ 21099", q: 5000}, {ad: "VAZ 2110", q: 5500}, {ad: "VAZ 2114", q: 7000},
    {ad: "Niva 4x4", q: 11000}, {ad: "Lada Priora", q: 13500}, {ad: "Lada Granta", q: 15000}, {ad: "Lada Vesta", q: 22000}, {ad: "UAZ Hunter", q: 9000},
    {ad: "Mercedes-Benz 190 (Dördgöz)", q: 8500}, {ad: "Mercedes W124 (Yeşka)", q: 12000}, {ad: "Mercedes C-Class W202", q: 11000}, {ad: "Mercedes E-Class W210", q: 16000}, {ad: "Mercedes S-Class W140", q: 20000},
    {ad: "Mercedes C-Class W203", q: 15000}, {ad: "Mercedes E-Class W211", q: 24000}, {ad: "Mercedes CLS 350", q: 32000}, {ad: "Mercedes S-Class W221", q: 45000}, {ad: "Mercedes G-Class G500", q: 95000},
    {ad: "Mercedes ML 350", q: 28000}, {ad: "Mercedes GL 450", q: 35000}, {ad: "Mercedes E-Class W212", q: 38000}, {ad: "Mercedes C-Class W204", q: 29000}, {ad: "Mercedes G63 AMG", q: 280000},
    {ad: "BMW 3 Series E36", q: 9500}, {ad: "BMW 5 Series E39", q: 14000}, {ad: "BMW X5 E53", q: 18000}, {ad: "BMW 7 Series E38", q: 15000}, {ad: "BMW 3 Series E46", q: 13000},
    {ad: "BMW 5 Series E60", q: 26000}, {ad: "BMW X5 E70", q: 35000}, {ad: "BMW 7 Series F01", q: 42000}, {ad: "BMW 5 Series F10", q: 48000}, {ad: "BMW X6 F16", q: 75000},
    {ad: "BMW M5 F90", q: 160000}, {ad: "BMW M4 G82", q: 145000}, {ad: "BMW X7 G07", q: 190000}, {ad: "BMW 7 Series G11", q: 85000}, {ad: "BMW i8", q: 110000},
    {ad: "Toyota Corolla (2008)", q: 18500}, {ad: "Toyota Corolla (2015)", q: 28000}, {ad: "Toyota Camry (2007)", q: 19500}, {ad: "Toyota Camry (2014)", q: 33000}, {ad: "Toyota Camry (2018)", q: 52000},
    {ad: "Toyota Camry (2023)", q: 85000}, {ad: "Toyota Prado 120", q: 38000}, {ad: "Toyota Prado 150", q: 75000}, {ad: "Toyota Land Cruiser 200", q: 110000}, {ad: "Toyota Land Cruiser 300", q: 210000},
    {ad: "Hyundai Elantra (2012)", q: 21000}, {ad: "Hyundai Elantra (2017)", q: 29000}, {ad: "Hyundai Elantra (2022)", q: 46000}, {ad: "Hyundai Accent", q: 17000}, {ad: "Hyundai Sonata (2011)", q: 22000},
    {ad: "Hyundai Sonata (2015)", q: 29500}, {ad: "Hyundai Sonata (2021)", q: 54000}, {ad: "Hyundai Santa Fe", q: 42000}, {ad: "Hyundai Tucson", q: 39000}, {ad: "Hyundai Grandeur", q: 34000},
    {ad: "Kia Rio", q: 18000}, {ad: "Kia Cerato", q: 24000}, {ad: "Kia Optima (2013)", q: 25000}, {ad: "Kia Optima (2017)", q: 35000}, {ad: "Kia K5 (2022)", q: 58000},
    {ad: "Kia Sportage", q: 36000}, {ad: "Kia Sorento", q: 48000}, {ad: "Kia Stinger", q: 55000}, {ad: "Kia Carnival", q: 62000}, {ad: "Kia Picanto", q: 14000},
    {ad: "Lexus IS 250", q: 26000}, {ad: "Lexus GS 350", q: 38000}, {ad: "Lexus ES 350", q: 45000}, {ad: "Lexus RX 350", q: 55000}, {ad: "Lexus LX 570", q: 135000},
    {ad: "Nissan Sunny", q: 14500}, {ad: "Nissan Tiida", q: 15500}, {ad: "Nissan Altima", q: 24000}, {ad: "Nissan X-Trail", q: 28000}, {ad: "Nissan Patrol", q: 95000},
    {ad: "Ford Fusion", q: 23000}, {ad: "Ford Focus", q: 17500}, {ad: "Ford Mustang", q: 55000}, {ad: "Ford F-150 Raptor", q: 145000}, {ad: "Chevrolet Cruze", q: 16500},
    {ad: "Chevrolet Malibu", q: 28500}, {ad: "Chevrolet Camaro", q: 48000}, {ad: "Chevrolet Tahoe", q: 85000}, {ad: "Opel Astra G", q: 9500}, {ad: "Volkswagen Passat", q: 22000},
    {ad: "Audi A6", q: 35000}, {ad: "Porsche Panamera", q: 85000}, {ad: "Porsche Cayenne", q: 75000}, {ad: "Tesla Model S", q: 95000}, {ad: "Rolls-Royce Cullinan", q: 650000},
    {ad: "Bugatti Chiron", q: 3500000}, {ad: "Ferrari SF90", q: 550000}, {ad: "Lamborghini Urus", q: 420000}, {ad: "Bentley Bentayga", q: 320000}, {ad: "Range Rover Vogue", q: 145000}
];
    for(let i=1; i<=100; i++) {
        let price = 1000 + (i * 2500);}

    const HOUSE_DATA = [
        {ad: "Köhnə Həyət Evi", q: 25000},
        {ad: "Yeni Tikili (2 Otaq)", q: 85000},
        {ad: "Yeni Tikili (3 Otaq)", q: 120000},
        {ad: "Həyət Evi (Bağ evi)", q: 180000},
        {ad: "Villa (Mərdəkan)", q: 350000},
        {ad: "Malikanə (Şüvəlan)", q: 800000},
        {ad: "Penthouse (Mərkəz)", q: 1500000}
    ];

    const MARKET_ITEMS = [
        {ad: "Xan Cyristal", q: 15}, {ad: "Döner", q: 6}, {ad: "Siqaret", q: 5}, {ad: "Bizon", q: 2}, {ad: "Su", q: 1},
        {ad: "Çörək", q: 1}, {ad: "Saqqız", q: 1}, {ad: "Qara Çay", q: 2}, {ad: "Kofe", q: 3}, {ad: "Şokolad", q: 2},
        {ad: "Süd", q: 3}, {ad: "Pendir", q: 5}, {ad: "Yağ", q: 18}, {ad: "Yumurta", q: 2}, {ad: "Kartof", q: 1},
        {ad: "Soğan", q: 1}, {ad: "Toyuq", q: 7}, {ad: "Ət", q: 16}, {ad: "Düyü", q: 3}, {ad: "Makaron", q: 2}
    ];

    let state = JSON.parse(localStorage.getItem('garson_final_fix')) || {
        pulqabı: 150, bank_hesabi: 0, masinlarim: [], evlerim: [], hedef: 1, benzin: 100
    };

    const out = document.getElementById('output');
    const grid = document.getElementById('button-grid');

    function print(t, color="#d0d0d0") { 
        const d = document.createElement('div'); 
        d.innerHTML = t; d.style.color = color;
        out.appendChild(d); out.scrollTop = out.scrollHeight; 
    }

    function updateStats() {
        document.getElementById('s-pul').textContent = state.pulqabı;
        document.getElementById('s-bank').textContent = state.bank_hesabi;
        document.getElementById('s-masin').textContent = state.masinlarim.length;
        document.getElementById('s-ev').textContent = state.evlerim.length;
        document.getElementById('s-benz').textContent = state.benzin;
        document.getElementById('s-is').textContent = `📍 Patron: "${state.hedef} nömrəli masanı sil!"`;
    }

    // --- BANK GƏLİRİ (HƏR DƏQİQƏ 1000 AZE) ---
    setInterval(() => {
        if(state.bank_hesabi > 0) {
            state.bank_hesabi += 1000;
            print("📈 Bankdakı puluna 1000 AZE gəlir gəldi. Bərəkətli olsun!", "#2ecc71");
            updateStats();
        }
    }, 60000);

    function mainMenu() {
        grid.innerHTML = `<div class="menu-title">-- MASALAR (1-10) --</div>`;
        for(let i=1; i<=10; i++) {
            let b = document.createElement('button');
            b.textContent = i; b.className = "action";
            b.onclick = () => {
                if(i === state.hedef) {
                    let q = Math.floor(Math.random() * 20) + 15;
                    state.pulqabı += q;
                    print(`✨ Masa ${i} təmizləndi! +${q} AZE bəxşiş aldın.`, "#2ecc71");
                    state.hedef = Math.floor(Math.random() * 10) + 1;
                    updateStats();
                } else print(`❌ Patron: "Səhv masadır! ${state.hedef}-ə get!"`, "#e74c3c");
            };
            grid.appendChild(b);
        }

        addButton("🌟 ŞANS", () => openLuck(), "luck-btn full-btn");
        addButton("🛒 MARKET", () => openMarket(), "action");
        addButton("🚗 MAŞIN BAZARI", () => openAuto(), "action");
        addButton("🏠 EV BAZARI", () => openHouses(), "action");
        addButton("🏦 BANK", () => openBank(), "money");
        addButton("⛽ BENZİN (2 AZE)", () => buyGas(), "money");
        addButton("🚕 TAKSİ", () => doTaxi(), "money");
        addButton("💰 SATIŞ", () => openSellMenu(), "sell-btn");
        addButton("💾 YADDA SAXLA", () => {
            localStorage.setItem('garson_final_fix', JSON.stringify(state));
            print("✅ Oyun yadda saxlanıldı!", "#2ecc71");
        }, "money full-btn");
    }

    function addButton(text, fn, cls) {
        let b = document.createElement('button');
        b.innerHTML = text; b.className = cls || ''; b.onclick = fn;
        grid.appendChild(b);
    }

    // --- SATIŞ VƏ 11 TƏKLİF MƏNTİQİ ---
    let offersCount = 1;
    function openSellMenu() {
        grid.innerHTML = `<div class="menu-title">NƏ SATIRSAN?</div>`;
        addButton("🚗 MAŞIN SAT", () => {
            if(state.masinlarim.length > 0) { offersCount=1; negotiate(state.masinlarim[0], 8000, 'm'); }
            else print("❌ Satmağa maşının yoxdur!");
        }, "action full-btn");
        
        addButton("🏠 EV SAT", () => {
            if(state.evlerim.length > 0) { offersCount=1; negotiate(state.evlerim[0], 50000, 'e'); }
            else print("❌ Satmağa evin yoxdur!");
        }, "action full-btn");

        addButton("GERİ", () => mainMenu(), "sell-btn full-btn");
    }

    function negotiate(item, price, type) {
        grid.innerHTML = `<div class="menu-title">🤝 PAZARLIQ (${item})</div>`;
        let offer = offersCount <= 11 ? Math.floor(price * (0.6 + Math.random()*0.3)) : Math.floor(price * (1.2 + Math.random()*0.5));
        print(`Müştəri ${offersCount}: "${offer} AZE verirəm. Razısan?"`);
        
        addButton(`✅ HƏ (${offer} AZE)`, () => {
            state.pulqabı += offer;
            if(type==='m') state.masinlarim.shift(); else state.evlerim.shift();
            print("🎉 Əşya satıldı! Pulun xeyrinə olsun.", "#2ecc71");
            updateStats(); mainMenu();
        }, "money full-btn");

        addButton(`❌ YOX, NÖVBƏTİ`, () => { offersCount++; negotiate(item, price, type); }, "sell-btn full-btn");
    }

    // --- EV ALMAQ (DÜZƏLDİLDİ) ---
    function openHouses() {
        grid.innerHTML = `<div class="menu-title">🏠 DAŞINMAZ ƏMLAK BAZARI</div>`;
        HOUSE_DATA.forEach(h => {
            let b = document.createElement('button');
            b.innerHTML = `${h.ad}<br>${h.q} A`;
            b.onclick = () => {
                if(state.pulqabı >= h.q) {
                    state.pulqabı -= h.q;
                    state.evlerim.push(h.ad);
                    print(`🏠 Təbrik! ${h.ad} aldın. Xeyirli olsun!`, "#2ecc71");
                    updateStats();
                } else print("❌ Bu evi almaq üçün hələ bir az da pul yığmalısan.", "#e74c3c");
            };
            grid.appendChild(b);
        });
        addButton("GERİ", () => mainMenu(), "sell-btn full-btn");
    }

    // --- MAŞIN BAZARI (100 MAŞIN) ---
    function openAuto() {
        grid.innerHTML = `<div class="menu-title">🚗 MAŞIN BAZARI (100 MODEL)</div>`;
        CARS_MASTER.forEach(c => {
            let b = document.createElement('button');
            b.innerHTML = `${c.ad}<br>${c.q} A`;
            b.onclick = () => {
                if(state.pulqabı >= c.q){
                    state.pulqabı -= c.q; state.masinlarim.push(c.ad);
                    print(`🎉 ${c.ad} xeyirli olsun! Sür mənə yetər.`, "#2ecc71"); updateStats();
                } else print("❌ Cibində kifayət qədər pul yoxdur!");
            };
            grid.appendChild(b);
        });
        addButton("GERİ", () => mainMenu(), "sell-btn full-btn");
    }

    function openLuck() {
        grid.innerHTML = `<div class="menu-title">🌟 ŞANSINI SINA</div>`;
        addButton("XƏRİTƏ", () => playLuck('x'), "luck-btn full-btn");
        addButton("GERB", () => playLuck('g'), "luck-btn full-btn");
        addButton("GERİ", () => mainMenu(), "sell-btn full-btn");
    }

    function playLuck(s) {
        let a = parseInt(prompt("Mərc məbləği:"));
        if(a > 0 && a <= state.pulqabı) {
            let r = Math.random() < 0.5 ? 'x' : 'g';
            if(s === r) { state.pulqabı += a; print(`✅ Qazandın! +${a} AZE!`, "#2ecc71"); }
            else { state.pulqabı -= a; print(`😔 Bu dəfə bəxtin gətirmədi. -${a} AZE.`, "#e74c3c"); }
            updateStats();
        }
    }

    function openMarket() {
        grid.innerHTML = `<div class="menu-title">🛒 MARKET</div>`;
        MARKET_ITEMS.forEach(i => {
            let b = document.createElement('button');
            b.innerHTML = `${i.ad}<br>${i.q} A`;
            b.onclick = () => { if(state.pulqabı >= i.q){ state.pulqabı -= i.q; print(`✅ ${i.ad} alındı. Nuş olsun!`); updateStats(); } };
            grid.appendChild(b);
        });
        addButton("GERİ", () => mainMenu(), "sell-btn full-btn");
    }

    function openBank() {
        grid.innerHTML = `<div class="menu-title">🏦 BANK</div>`;
        addButton("YATIR", () => { let m=parseInt(prompt("Məbləğ:")); if(m<=state.pulqabı){state.pulqabı-=m; state.bank_hesabi+=m; updateStats(); print("✅ Pul yatırıldı.");} }, "money full-btn");
        addButton("ÇIXAR", () => { let m=parseInt(prompt("Məbləğ:")); if(m<=state.bank_hesabi){state.bank_hesabi-=m; state.pulqabı+=m; updateStats(); print("✅ Pul çıxarıldı.");} }, "money full-btn");
        addButton("GERİ", () => mainMenu(), "sell-btn full-btn");
    }

    function buyGas() { let l=parseInt(prompt("Neçə litr (1L=2AZE)?")); if(l*2 <= state.pulqabı){ state.pulqabı-=l*2; state.benzin+=l; updateStats(); print("⛽ Benzin doldu."); } }
    
    function doTaxi() {
        if(state.masinlarim.length > 0 && state.benzin >= 10) {
            state.benzin -= 10; print("🚕 Taksi fəaliyyəti başladı...");
            setTimeout(() => { let q=Math.floor(Math.random()*80)+40; state.pulqabı+=q; print(`✅ Müştərini çatdırdın! +${q} AZE!`); updateStats(); }, 1000);
        } else print("❌ Maşın və ya kifayət qədər benzin yoxdur!");
    }

    updateStats(); mainMenu();
</script>
</body>
</html>
